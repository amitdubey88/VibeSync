version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: vibesync_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vibesync

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibesync_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/vibesync
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      MAX_FILE_SIZE_MB: 500
      UPLOAD_DIR: uploads
    volumes:
      - video_uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: vibesync_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  video_uploads:
