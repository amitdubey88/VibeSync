<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Bold V shape -->
  <path d="M12 16 L32 50 L52 16" stroke="url(#vGrad)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Small sync arc on bottom right -->
  <path d="M44 46 A10 10 0 0 0 54 37" stroke="#8b5cf6" stroke-width="3"
        stroke-linecap="round" fill="none" opacity="0.8"/>
  <polygon points="54,33 54,41 59,37" fill="#8b5cf6" opacity="0.8"/>
</svg>
