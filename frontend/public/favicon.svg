<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Obsidian Background -->
  <rect width="512" height="512" rx="120" fill="#050a14"/>
  
  <defs>
    <!-- Glow Filters -->
    <filter id="purple-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
    </filter>
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
    </filter>
    <filter id="glass-shine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa55ff" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <!-- Large Background Purple Bloom -->
  <path d="M140 120L256 400L372 120" stroke="#aa55ff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" filter="url(#purple-glow)" opacity="0.4"/>
  
  <!-- Neon Blue Core Glow -->
  <path d="M140 120L256 400L372 120" stroke="#4facfe" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" filter="url(#blue-glow)" opacity="0.7"/>

  <!-- Main Glassy V Path -->
  <path d="M140 120L256 400L372 120" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Bright Inner Core (The "Light") -->
  <path d="M140 120L256 400L372 120" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  
  <!-- Subtle Glass Highlight -->
  <path d="M150 130L256 385L362 130" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#glass-shine)" />
</svg>
