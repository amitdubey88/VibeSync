services:
  - type: web
    name: vibesync-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --production
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # e.g. https://vibesync.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # from cloudinary.com dashboard
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAX_FILE_SIZE
        value: 524288000 # 500MB
